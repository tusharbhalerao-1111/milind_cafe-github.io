<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Milind Cafe</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #ff6347;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: none;
            overflow: hidden;
        }

        .card-body {
            padding: 40px 30px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .login-header h2 {
            color: var(--dark);
            font-weight: 700;
        }

        .form-label {
            font-weight: 500;
            color: #333;
        }

        .form-control {
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(255, 99, 71, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #ff6347, #667eea);
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 99, 71, 0.4);
        }

        .forgot-links {
            margin-top: 20px;
            text-align: center;
            font-size: 0.95rem;
        }

        .forgot-links a {
            color: #667eea;
            text-decoration: none;
        }

        .forgot-links a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #666;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .alert {
            border-radius: 10px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card">
            <div class="card-body">

                <!-- Header -->
                <div class="login-header">
                    <i class="fas fa-user-shield"></i>
                    <h2>Admin Login</h2>
                    <p class="text-muted">Milind Cafe Management Panel</p>
                </div>

                <!-- Error Message (Demo) -->
                <!-- You can remove this div when integrating with backend -->
                <!--
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    Invalid username or password!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                -->

                <!-- Login Form -->
                <form action="#" method="POST">
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-user me-2"></i> Username
                        </label>
                        <input type="text" 
                               name="username" 
                               class="form-control" 
                               placeholder="Enter your username" 
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-lock me-2"></i> Password
                        </label>
                        <input type="password" 
                               name="password" 
                               class="form-control" 
                               placeholder="Enter your password" 
                               required>
                    </div>

                    <button type="submit" name="login" class="btn btn-login text-white w-100">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </button>
                </form>

                <!-- Forgot Links -->
                <div class="forgot-links">
                    <a href="forgot_password.html"><i class="fas fa-key"></i> Forgot Password?</a> 
                    <span class="mx-2 text-muted">|</span>
                    <a href="forgot_username.html"><i class="fas fa-user"></i> Forgot Username?</a>
                </div>

                <!-- Back to Website -->
                <div class="text-center">
                    <a href="../index.html" class="back-link">
                        <i class="fas fa-arrow-left me-1"></i> Back to Website
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
